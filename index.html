let currentTopic = 'trabajo';
let usedIndices = {};
let currentExercise = null;

document.querySelectorAll('.topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTopic = btn.dataset.topic;
    loadNext();
  });
});

function loadNext() {
  document.getElementById('resultsArea').innerHTML = '';
  const pool = EXERCISES[currentTopic];
  if (!usedIndices[currentTopic]) usedIndices[currentTopic] = [];
  let available = pool.map((_,i) => i).filter(i => !usedIndices[currentTopic].includes(i));
  if (available.length === 0) { usedIndices[currentTopic] = []; available = pool.map((_,i) => i); }
  const idx = available[Math.floor(Math.random() * available.length)];
  usedIndices[currentTopic].push(idx);
  currentExercise = pool[idx];
  const total = pool.length;
  const done = usedIndices[currentTopic].length;
  document.getElementById('counter').textContent = `第 ${done} / ${total} 题`;
  renderExercise(currentExercise);
}

function renderExercise(ex) {
  const p = ex.paragraphs;
  const b = ex.blanks;
  let html = `<div class="article-card">
    <div class="article-meta">C1 · 词语派生 · ${esc(ex.title)}</div>
    <div class="article-text">`;
  for (let i = 0; i < b.length; i++) {
    html += esc(p[i]);
    html += `<span class="blank-group">
      <span class="blank-hint">${esc(b[i].root)}（${esc(b[i].zh_hint)}）</span>
      <input class="blank-input" type="text" id="blank_${b[i].id}" placeholder="？" autocomplete="off" autocorrect="off" spellcheck="false">
    </span>`;
  }
  if (p[b.length]) html += esc(p[b.length]);
  html += `</div></div><button class="check-btn" onclick="checkAnswers()">批改答案 ✓</button>`;
  document.getElementById('exerciseArea').innerHTML = html;
}

function checkAnswers() {
  if (!currentExercise) return;
  const b = currentExercise.blanks;
  let correct = 0;
  let details = '';
  b.forEach(blank => {
    const inp = document.getElementById('blank_' + blank.id);
    const val = inp ? inp.value.trim().toLowerCase() : '';
    const ok = val === blank.answer.toLowerCase();
    if (ok) { correct++; if (inp) inp.classList.add('correct'); }
    else { if (inp) inp.classList.add('wrong'); }
    const cls = ok ? 'ok' : 'no';
    const userNote = (!ok && val) ? `（你填的：${esc(val)}）` : (!ok ? '（未作答）' : '');
    details += `<div class="result-card ${cls}">
      <div class="result-num">${ok?'✓':'✗'} 第${blank.id}空 · ${esc(blank.root)}</div>
      <div class="result-answer">${ok ? '✓ '+esc(blank.answer) : '✗ '+esc(blank.answer)+userNote}</div>
      <div class="result-zh">${esc(blank.zh_answer)}</div>
    </div>`;
  });
  const pct = Math.round(correct / b.length * 100);
  document.getElementById('resultsArea').innerHTML =
    `<div class="score-bar"><div class="score-big">${correct} / ${b.length}</div><div class="score-label">答对 ${pct}%</div></div>` + details;
  document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth' });
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadNext();
</script>
</body>
</html>
